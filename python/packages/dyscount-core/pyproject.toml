[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dyscount-core"
version = "0.1.0"
description = "Core library for Dyscount task queue system"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "msgpack>=1.0.0",
    "aiosqlite>=0.20.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dyscount_core"]

[tool.hatch.build.targets.sdist]
include = ["src/"]
