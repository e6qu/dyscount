[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dyscount-api"
version = "0.1.0"
description = "REST API for Dyscount task queue system"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "structlog>=24.0.0",
    "prometheus-client>=0.20.0",
    "dyscount-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dyscount_api"]

[project.scripts]
dyscount-server = "dyscount_api.main:main"

[tool.hatch.build.targets.sdist]
include = ["src/"]
